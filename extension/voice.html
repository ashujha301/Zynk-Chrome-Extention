<!DOCTYPE html>
<html>
<head>
  <title>Zynk Voice</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }
    h2 {
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    #startBtn { background: #4CAF50; }
    #stopBtn { background: #F44336; }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <h2>Zynk AI</h2>

  <button id="startBtn">Start Listening</button>
  <button id="stopBtn" disabled>Stop</button>

  <div id="status">Idle</div>

  <script src="voice.js"></script>

</body>
</html>
